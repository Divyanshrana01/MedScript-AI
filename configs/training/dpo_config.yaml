# DPO on top of the SFT adapter. Consumed by ml/training/preference_dataset.py,
# ml/training/dpo_train.py, and ml/evaluation/eval_dpo.py.

base_model: meta-llama/Llama-3.1-8B-Instruct
sft_adapter_repo: Divyansh619/medscriptai-sft-adapter
max_seq_length: 2048

# --- preference set (preference_dataset.py) ---
# chosen = existing gpt-4o gold from the synthetic pairs; rejected = the SFT
# adapter sampled hot on the same prompt; a judge keeps only pairs where chosen
# clearly beats rejected. Safety-sensitive aspects only, per the Week 3 scope.
# The synthetic pairs carry the task_type metadata the safety filter needs, so
# they load from a private hub dataset (Kaggle can't see the gitignored local
# file); synthetic_pairs_path is the local fallback for dev on this machine.
nice_qa_repo: Divyansh619/medscriptai-nice-qa
synthetic_pairs_path: data/synthetic/qa_pairs.jsonl
dpo_dataset_repo: Divyansh619/medscriptai-dpo
safety_aspects:
  - emergency or urgent management
  - medication safety and contraindications
  - follow-up, monitoring and referral decisions
# temp 1.0 / 400 tokens: the first run's temp-1.2, 800-token rejected samples
# came out ~2x longer than the gold chosen, so DPO mostly learned "be shorter"
# instead of "be safer" -- keep rejected roughly length-matched to chosen.
sample_temperature: 1.0
sample_max_new_tokens: 400
judge_model: gpt-4o-mini
judge_margin: 1  # chosen must outscore rejected by at least this (1-10 rubric)
# held out from DPO training, used by eval_dpo.py as in-domain eval prompts
eval_holdout: 32

# --- DPO training (dpo_train.py) ---
# The SFT adapter is merged into a frozen base so TRL's implicit PEFT
# reference (adapter disabled) is the SFT model, not the raw base -- a fresh
# LoRA on top is the trainable DPO policy. Merged in 16bit (unsloth's 4bit
# merge path errors out) and kept in /tmp so the ~16GB dir never lands in the
# notebook's persisted output.
merged_sft_dir: /tmp/merged_sft
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

beta: 0.1
learning_rate: 0.000005
epochs: 2
batch_size: 1
grad_accum: 8
# DPO holds chosen+rejected in memory at once; cap lengths so a pair fits on a T4.
max_length: 1024
max_prompt_length: 512

output_dir: adapter_dpo
adapter_hub_repo: Divyansh619/medscriptai-dpo-adapter
mlflow_experiment: fine-tuning

save_steps: 50
save_total_limit: 2

# --- eval (eval_dpo.py) ---
# Win rate = judge preferring DPO over SFT on the held-out safety prompts (the
# DPO target domain -- the first run evaluated on the MedQA-heavy validation
# split and punished the style shift DPO was trained to make). Safety rate is
# logged for BOTH models so the DPO number has a baseline.
eval_max_new_tokens: 800

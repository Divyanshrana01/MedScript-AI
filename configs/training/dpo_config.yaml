# DPO on top of the SFT adapter. Consumed by ml/training/preference_dataset.py,
# ml/training/dpo_train.py, and ml/evaluation/eval_dpo.py.

base_model: meta-llama/Llama-3.1-8B-Instruct
sft_adapter_repo: Divyansh619/medscriptai-sft-adapter
max_seq_length: 2048

# --- preference set (preference_dataset.py) ---
# Fully on-policy pairs: n_samples come from the SFT adapter per safety prompt,
# the judge scores each, best = chosen / worst = rejected, and the pair is kept
# only when the margin is >= pair_margin. Earlier gold-as-chosen builds
# displaced the model's own outputs instead of teaching preference (the gold
# was far off-policy AND memorised from SFT training). Safety aspects only,
# per the Week 3 scope. Prompts load from the private hub dataset (Kaggle
# can't see the gitignored local jsonl); synthetic_pairs_path is the dev
# fallback on this machine.
nice_qa_repo: Divyansh619/medscriptai-nice-qa
synthetic_pairs_path: data/synthetic/qa_pairs.jsonl
dpo_dataset_repo: Divyansh619/medscriptai-dpo
# eval questions live in their own repo: they have no chosen/rejected columns,
# and the hub rejects splits whose features differ within one dataset
dpo_eval_repo: Divyansh619/medscriptai-dpo-eval
safety_aspects:
  - emergency or urgent management
  - medication safety and contraindications
  - follow-up, monitoring and referral decisions
n_samples: 4
sample_temperature: 0.9
sample_max_new_tokens: 400
judge_model: gpt-4o-mini
pair_margin: 3  # best must outscore worst by this (1-10 rubric) or the pair is dropped
# fresh eval questions (gen_eval_questions.py): unused section x safety-aspect
# combos, never seen in SFT or DPO training data
eval_size: 40

# --- DPO training (dpo_train.py) ---
# The SFT adapter is merged into a frozen base so TRL's implicit PEFT
# reference (adapter disabled) is the SFT model, not the raw base -- a fresh
# LoRA on top is the trainable DPO policy. Merged in 16bit (unsloth's 4bit
# merge path errors out) and kept in /tmp so the ~16GB dir never lands in the
# notebook's persisted output.
merged_sft_dir: /tmp/merged_sft
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

# beta 0.3 + rpo_alpha: the gold chosen is far off-policy for the SFT model, so
# plain DPO got almost no usable "raise chosen" gradient and spent the update
# crushing the model's own outputs (win_rate fell run over run as steps grew).
# The NLL term (rpo_alpha) turns the chosen arm into real SFT-toward-gold; the
# higher beta keeps the policy leashed to the SFT reference.
beta: 0.3
rpo_alpha: 1.0
learning_rate: 0.000005
epochs: 1
batch_size: 1
grad_accum: 8
# DPO holds chosen+rejected in memory at once; cap lengths so a pair fits on a T4.
max_length: 1024
max_prompt_length: 512

output_dir: adapter_dpo
adapter_hub_repo: Divyansh619/medscriptai-dpo-adapter
mlflow_experiment: fine-tuning

save_steps: 50
save_total_limit: 2

# --- eval (eval_dpo.py) ---
# Win rate = judge preferring DPO over SFT on the fresh eval questions. Those
# must be unseen by BOTH models: an earlier eval reused prompts whose gold
# answers were in SFT's training data, so SFT "won" by reciting memorised
# answers. Safety rate is logged for both models so the DPO number has a
# baseline.
eval_max_new_tokens: 800

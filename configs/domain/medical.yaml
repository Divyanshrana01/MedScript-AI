domain:
  name: medical
  display_name: "Clinical Decision Support"

# Data sources for both training and the RAG knowledge base.
# PLAB is deferred per the agreed 6-8 week scope.
datasets:
  - name: nice_guidelines
    source: local
    path: data/raw/nice
  - name: medqa
    source: hf
    repo: GBaker/MedQA-USMLE-4-options-hf

# UK/BNF terms to enforce in synthetic generation, not US equivalents.
terminology_rules:
  - use: paracetamol
    not: acetaminophen
  - use: adrenaline
    not: epinephrine
  - use: salbutamol
    not: albuterol
  - use: "A&E / Emergency Department"
    not: "ER / Emergency Room"
  - use: GP
    not: "primary care physician"

guideline_authority: NICE

# Prompt variants live as .txt files under configs/prompts/ (added Week 5/6).
# active_variant is the one line updated once the prompt-variants MLflow
# experiment picks a winner.
agents:
  clinical_qa:
    prompt_variants:
      direct: configs/prompts/clinical_direct.txt
      cot: configs/prompts/clinical_cot.txt
    active_variant: direct
    temperature: 0.2
    max_tokens: 800
  literature:
    prompt_variants:
      direct: configs/prompts/lit_direct.txt
      cot: configs/prompts/lit_cot.txt
    active_variant: direct
    temperature: 0.3
    max_tokens: 600

# Hybrid RAG tuning, consumed by backend/app/rag/retriever.py (Week 4).
rag:
  embed_model: BAAI/bge-m3
  reranker: cross-encoder/ms-marco-MiniLM-L-12-v2
  chunk_size: 512
  chunk_overlap: 64
  top_k_retrieve: 20
  top_k_rerank: 6
  rrf_k: 60

safety:
  pii_masking: true
  disclaimer: "Decision support only. Not a diagnostic tool."

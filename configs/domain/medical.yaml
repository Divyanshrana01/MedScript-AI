domain:
  name: medical
  display_name: "Clinical Decision Support"

datasets:
  - name: nice_guidelines
    source: local
    path: data/raw/nice
  - name: medqa
    source: hf
    repo: bigbio/med_qa

terminology_rules:
  # enforced in synthetic generation prompts (UK/BNF terms, not US/Indian equivalents)
  - use: paracetamol
    not: acetaminophen
  - use: adrenaline
    not: epinephrine
  - use: salbutamol
    not: albuterol
  - use: "A&E / Emergency Department"
    not: "ER / Emergency Room"
  - use: GP
    not: "primary care physician"

guideline_authority: NICE

agents:
  clinical_qa:
    prompt_variants:
      direct: configs/prompts/clinical_direct.txt
      cot: configs/prompts/clinical_cot.txt
    active_variant: direct  # placeholder until the prompt-variants MLflow experiment picks a winner
    temperature: 0.2
    max_tokens: 800
  literature:
    prompt_variants:
      direct: configs/prompts/lit_direct.txt
      cot: configs/prompts/lit_cot.txt
    active_variant: direct
    temperature: 0.3
    max_tokens: 600

rag:
  embed_model: BAAI/bge-m3
  reranker: cross-encoder/ms-marco-MiniLM-L-12-v2
  chunk_size: 512
  chunk_overlap: 64
  top_k_retrieve: 20
  top_k_rerank: 6
  rrf_k: 60

safety:
  pii_masking: true
  disclaimer: "Decision support only. Not a diagnostic tool."
